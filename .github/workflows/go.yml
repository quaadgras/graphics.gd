name: Go

on:
  push:
    branches: ["release", "staging"]
  pull_request:
    branches: ["release"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Compute week key
        id: week
        shell: bash
        run: echo "week=$(date +%Y-%W)" >> $GITHUB_OUTPUT

      - name: Cache ~/gd directory
        uses: actions/cache@v4
        with:
          path: ~/gd
          key: ${{ runner.os }}-gd-weekly-${{ steps.week.outputs.week }}
          restore-keys: ${{ runner.os }}-gd-weekly-

      - name: Command Line Tooling
        run: |
          cd ./cmd/gd
          go build -o gd.exe

      - name: Test
        run: |
          cd ./internal
          DEBUG_CMD=1 ../cmd/gd/gd.exe test
        shell: bash
