name: Go

on:
  push:
    branches: ["release", "staging"]
  pull_request:
    branches: ["release"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"

      - name: Compute week key
        id: week
        shell: bash
        run: echo "week=$(date +%Y-%W)" >> $GITHUB_OUTPUT

      - name: Cache ~/gd directory
        uses: actions/cache@v4
        with:
          path: ~/gd
          key: ${{ runner.os }}-gd-weekly-${{ steps.week.outputs.week }}
          restore-keys: ${{ runner.os }}-gd-weekly-

      - name: Command Line Tooling
        run: |
          cd ./cmd/gd
          go build -o gd.exe

      - name: Test
        env:
          # Go 1.26's Green Tea GC emits an AVX-512 span-scan (scanSpanPackedAVX512) that
          # faults with SIGILL on the subset of GitHub windows-latest runners whose CPU
          # lacks AVX-512 (the gate avx512ScanPackedReqsMet doesn't check AVX512DQ, used
          # by kmovb). Disable the experiment on Windows until upstream fixes the gate.
          # See golang/go#77674.
          GOEXPERIMENT: ${{ matrix.os == 'windows-latest' && 'nogreenteagc' || '' }}
        run: |
          cd ./internal
          echo "GOEXPERIMENT=$(go env GOEXPERIMENT)"
          DEBUG_CMD=1 ../cmd/gd/gd.exe test -v
        shell: bash

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"

      # Node 22+ provides the global WebSocket the headless runner uses to talk
      # to Chromium over the DevTools protocol.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Compute week key
        id: week
        shell: bash
        run: echo "week=$(date +%Y-%W)" >> $GITHUB_OUTPUT

      - name: Cache ~/gd directory
        uses: actions/cache@v4
        with:
          path: ~/gd
          key: ${{ runner.os }}-gd-weekly-${{ steps.week.outputs.week }}
          restore-keys: ${{ runner.os }}-gd-weekly-

      - name: Command Line Tooling
        run: |
          cd ./cmd/gd
          go build -o gd.exe

      # Builds the js/wasm test binary, exports the Godot web build, serves it,
      # and runs it in headless Chromium (the runner's preinstalled
      # google-chrome), failing if the embedded `go test` fails. See
      # startup/internal/webtest/README.md.
      - name: Web Tests (headless browser)
        run: |
          GD="$PWD/cmd/gd/gd.exe" bash startup/internal/webtest/run_web_tests.sh -v
