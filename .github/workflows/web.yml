name: Web

on:
  push:
    branches: ["release", "staging"]
  pull_request:
    branches: ["release"]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"

      # Node 22+ provides the global WebSocket the headless test runner uses to
      # talk to Chromium over the DevTools protocol.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Compute week key
        id: week
        shell: bash
        run: echo "week=$(date +%Y-%W)" >> $GITHUB_OUTPUT

      # gd downloads Godot (and the web export template) under ~/gd; cache it the
      # same way the native Go workflow does.
      - name: Cache ~/gd
        uses: actions/cache@v4
        with:
          path: ~/gd
          key: ${{ runner.os }}-gd-weekly-${{ steps.week.outputs.week }}
          restore-keys: ${{ runner.os }}-gd-weekly-

      - name: Command Line Tooling
        run: |
          cd ./cmd/gd
          go build -o gd.exe

      # Builds the js/wasm test binary, exports the Godot web build, serves it,
      # and runs it in headless Chromium (preinstalled `google-chrome` on the
      # runner), failing if the embedded `go test` fails. See the script and
      # startup/internal/webtest/README.md for details.
      - name: Web Tests (headless browser)
        run: |
          GD="$PWD/cmd/gd/gd.exe" bash startup/internal/webtest/run_web_tests.sh -v
